CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_DK_LIBRARY=y

CONFIG_BT=y
# ROLE-SWAP SPIKE: reflector is now the BLE central (scans + connects)
CONFIG_BT_CENTRAL=y
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_NAME_CNT=1
CONFIG_BT_SMP=y
# GATT client: discover + subscribe + write the CS-Turn service on each initiator.
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="Nordic CS IPT Reflector Central"
CONFIG_BT_MAX_CONN=3
# The bt_keys pool is sized by BT_MAX_PAIRED regardless of bonding; without enough
# slots the 2nd link's pairing fails with -ENOMEM. Must be >= BT_MAX_CONN.
CONFIG_BT_MAX_PAIRED=3
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_BONDABLE=n

# Multi-link CS as the central: allow up to 3 concurrent CS procedures, and SPACE
# the central links so their CS subevents do not collide. Spacing must fit one
# ~5 ms CS subevent + ~0.5 ms guard + window widening (~6.5 ms). Uniform connection
# interval (30 ms, set in code) >= N * spacing keeps the links collision-free.
CONFIG_BT_CTLR_SDC_CS_COUNT=3
CONFIG_BT_CTLR_SDC_CENTRAL_ACL_EVENT_SPACING_DEFAULT=6500
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=200

CONFIG_BT_CTLR_PHY_2M=y

# This reduces RAM usage. Additional RAM is needed to support optional
# features such as mode 3 or multiantenna. Change or remove these if
# using those features
CONFIG_BT_CS_DE_MAX_NUM_ANTENNA_PATHS=1
CONFIG_BT_CTLR_SDC_CS_MAX_ANTENNA_PATHS=1
CONFIG_BT_CTLR_SDC_CS_NUM_ANTENNAS=1
CONFIG_BT_CTLR_SDC_CS_STEP_MODE3=n
CONFIG_BT_CTLR_SDC_CS_ROLE_REFLECTOR_ONLY=y

# Disabling the CS Test command reduces flash usage
CONFIG_BT_CTLR_CHANNEL_SOUNDING_TEST=n

# This allows CS and ACL to use different PHYs
CONFIG_BT_TRANSMIT_POWER_CONTROL=y

# This is required for CS Enhancements
CONFIG_BT_CTLR_EXTENDED_FEAT_SET=y

# Let the initiating device control the PHY updates
CONFIG_BT_AUTO_PHY_UPDATE=n

CONFIG_BT_CHANNEL_SOUNDING=y
