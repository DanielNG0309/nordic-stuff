common:
  sysbuild: true
  tags:
    - ci_build
    - ci_tests_benchmarks_multicore
  platform_allow:
    - nrf54h20dk/nrf54h20/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54l15dk/nrf54l15/cpuapp
  integration_platforms:
    - nrf54h20dk/nrf54h20/cpuapp
    - nrf54lm20dk/nrf54lm20a/cpuapp
    - nrf54l15dk/nrf54l15/cpuapp

tests:

  # -------------------------------------------------------------------------
  # nRF54H20 tests
  # -------------------------------------------------------------------------

  benchmarks.multicore.flpr_sleep_test.h20_no_sleep:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    required_snippets:
      - nordic-log-stm
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "app/flpr_sleep_test: Multicore flpr_sleep_test on"
        - "flpr/flpr_sleep_test: Multicore flpr_sleep_test on"
        - "flpr_sleep_test: Run 0"
        - "flpr_sleep_test: Run 1"

  benchmarks.multicore.flpr_sleep_test.h20_idle_retained:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    tags: ppk_power_measure
    extra_args:
      - flpr_sleep_test_CONF_FILE=prj_silent.conf
      - remote_flpr_CONF_FILE=prj_silent.conf
      - flpr_sleep_test_CONFIG_TEST_SLEEP_DURATION_MS=500
      - remote_flpr_CONFIG_TEST_SLEEP_DURATION_MS=500
      - flpr_sleep_test_EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_NRF_MODULE_DIR}/tests/benchmarks/multicore/common/workaround_idle_retained.overlay"
    harness: pytest
    harness_config:
      fixture: ppk_power_measure
      pytest_root:
        - "${CUSTOM_ROOT_TEST_DIR}/test_measure_power_consumption.py::test_measure_and_data_dump_ppr_and_idle"

  benchmarks.multicore.flpr_sleep_test.h20_idle:
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    tags: ppk_power_measure
    extra_args:
      - flpr_sleep_test_CONF_FILE=prj_silent.conf
      - remote_flpr_CONF_FILE=prj_silent.conf
      - flpr_sleep_test_CONFIG_TEST_SLEEP_DURATION_MS=500
      - remote_flpr_CONFIG_TEST_SLEEP_DURATION_MS=500
      - flpr_sleep_test_EXTRA_DTC_OVERLAY_FILE="${ZEPHYR_NRF_MODULE_DIR}/tests/benchmarks/multicore/common/workaround_idle.overlay"
    harness: pytest
    harness_config:
      fixture: ppk_power_measure
      pytest_root:
        - "${CUSTOM_ROOT_TEST_DIR}/test_measure_power_consumption.py::test_measure_and_data_dump_ppr_and_idle"

  benchmarks.multicore.flpr_sleep_test.h20_s2ram:
