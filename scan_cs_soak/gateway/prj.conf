# scan_cs_soak GATEWAY - BLE Observer that never stops scanning, and on a loop
# connects to the CS target, runs a bounded CS burst, removes the CS config and
# disconnects. Reproduces a continuously-scanning BLE gateway architecture to
# soak-test the connect -> CS -> remove_config -> disconnect cycle.

CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y

# THE KEY: keep scanning while connecting/connected (production since NCS v2.9.0).
CONFIG_BT_SCAN_AND_INITIATE_IN_PARALLEL=y
CONFIG_BT_CTLR_SDC_ALLOW_PARALLEL_SCANNING_AND_INITIATING=y

CONFIG_BT_SMP=y
# Non-bondable: encrypt fresh each connection (CS security needs an encrypted
# link). Storing bonds across rapid reconnect cycles desyncs the keys between the
# two sides and encryption then fails with "key missing" (err 4).
CONFIG_BT_BONDABLE=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_AUTO_PHY_CENTRAL_NONE=y
CONFIG_BT_CHANNEL_SOUNDING=y

CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247

CONFIG_MAIN_STACK_SIZE=4096

# Thread analyzer: show the MPSL Work stack high-water mark plateau across many
# cycles (a reported "MPSL leak" here is really this watermark - monotonic by design).
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# IPT (Inline PCT Transfer) + cs_de IFFT: when this device is the CS initiator it
# computes distance locally from its own subevent data - no RAS/GATT step transfer.
CONFIG_BT_CTLR_EXTENDED_FEAT_SET=y
CONFIG_BT_TRANSMIT_POWER_CONTROL=y
CONFIG_BT_CS_DE=y
CONFIG_BT_CS_DE_1024_NFFT=y
CONFIG_BT_CS_DE_MAX_NUM_ANTENNA_PATHS=1
CONFIG_BT_CTLR_SDC_CS_MAX_ANTENNA_PATHS=1
CONFIG_BT_CTLR_SDC_CS_NUM_ANTENNAS=1
CONFIG_BT_CTLR_SDC_CS_STEP_MODE3=n
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
# Headroom for cs_de_ifft() running in the subevent callback (BT RX work queue).
CONFIG_BT_RX_STACK_SIZE=4096

CONFIG_CBPRINTF_FP_SUPPORT=y
